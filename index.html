<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Real-Time | Full Cell 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-gradient { background: linear-gradient(135deg, #012169 0%, #003366 100%); }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; z-index: 100; }
        /* Animación de carga para la tasa */
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white py-6 shadow-sm">
        <div class="container mx-auto px-6">
            <h1 class="text-2xl font-black text-blue-900 tracking-tight">FULL CELL <span class="text-orange-500 font-extrabold uppercase text-3xl">360</span></h1>
        </div>
    </nav>

    <section class="hero-gradient py-12 md:py-24 px-6 min-h-[85vh] flex items-center">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-12">
            
            <div class="text-white max-w-lg">
                <h2 class="text-5xl font-extrabold mb-6 italic">Chile ➔ Bolivia</h2>
                <p class="text-xl opacity-90 mb-6">Cotización instantánea con la tasa oficial de Full Cell 360 actualizada vía satélite.</p>
                <div id="status-sheet" class="inline-flex items-center gap-2 bg-blue-900/50 px-4 py-2 rounded-full text-xs font-bold border border-blue-400/30">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> TASA SINCRONIZADA CON CENTRAL
                </div>
            </div>

            <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 relative">
                <div class="mb-8">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Tú envías (CLP)</label>
                    <div class="flex items-center border-b-4 border-blue-700 py-2">
                        <input type="number" id="input-clp" value="100000" class="w-full text-4xl font-bold outline-none text-gray-800">
                        <span class="text-xl font-black text-blue-700 ml-2">CLP</span>
                    </div>
                </div>

                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 mb-8">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-gray-500 font-medium italic text-sm">Tipo de cambio:</span>
                        <span id="display-tasa" class="text-blue-700 font-black text-lg loading-pulse">Cargando...</span>
                    </div>
                </div>

                <div class="mb-10">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Reciben en Bolivia (BOB)</label>
                    <div class="flex items-center border-b-4 border-gray-100 py-2">
                        <input type="text" id="output-bob" readonly class="w-full text-4xl font-bold text-blue-900 bg-transparent outline-none">
                        <span class="text-xl font-black text-gray-300 ml-2">BOB</span>
                    </div>
                </div>

                <button onclick="enviarWhatsApp()" class="w-full bg-blue-700 hover:bg-orange-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl text-xl uppercase flex items-center justify-center gap-3">
                    Solicitar Envío
                </button>
            </div>
        </div>
    </section>

    <script>
        // CONFIGURACIÓN CLAVE
        const SPREADSHEET_ID = '1w7hj_vFnYEMqdIuHT4Ua2HOhGqjVkPq1K_0qK7q5fLM'; // <--- PEGA AQUÍ EL ID DE TU HOJA
        const WHATSAPP_NUM = '56945665141'; // <--- TU NÚMERO AQUÍ
        
        let tasaActual = 0;

        async function obtenerTasaDeGoogle() {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&range=B1`;
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                // Limpiar el texto recibido (Google Sheets a veces envía comillas)
                tasaActual = parseFloat(text.replace(/"/g, '').replace(',', '.'));
                
                document.getElementById('display-tasa').classList.remove('loading-pulse');
                document.getElementById('display-tasa').innerText = `1 CLP = ${tasaActual} BOB`;
                actualizarCalculos();
            } catch (error) {
                console.error("Error leyendo la tasa:", error);
                document.getElementById('display-tasa').innerText = "Error de conexión";
            }
        }

        function actualizarCalculos() {
            const clp = parseFloat(document.getElementById('input-clp').value) || 0;
            const resultado = (clp * tasaActual).toLocaleString('es-BO', { minimumFractionDigits: 2 });
            document.getElementById('output-bob').value = resultado;
        }

        function enviarWhatsApp() {
            const clp = document.getElementById('input-clp').value;
            const bob = document.getElementById('output-bob').value;
            
            const mensaje = `*FULL CELL 360 - COTIZACIÓN*%0A%0A` +
                            `🇨🇱 *Envío:* ${clp} CLP%0A` +
                            `🇧🇴 *Reciben:* ${bob} BOB%0A` +
                            `📈 *Tasa:* ${tasaActual}%0A%0A` +
                            `_Favor de confirmar disponibilidad._`;
            
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${mensaje}`, '_blank');
        }

        document.getElementById('input-clp').addEventListener('input', actualizarCalculos);

        // Cargar tasa al abrir
        obtenerTasaDeGoogle();
    </script>
</body>
</html>
