<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Envíos | Full Cell Calama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #012169 0%, #0055aa 100%); }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50px; display: flex; justify-content: center; align-items: center; font-size: 30px; shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body class="bg-gray-50">

    <a href="https://wa.me/TUNUMEROAQUI" class="whatsapp-float shadow-lg hover:scale-110 transition-transform">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav class="bg-white py-6 shadow-sm">
        <div class="container mx-auto px-6 text-center md:text-left">
            <div class="text-3xl font-black text-blue-900 tracking-tighter">
                FULL CELL <span class="text-orange-500">CALAMA</span>
            </div>
        </div>
    </nav>

    <section class="hero-gradient py-12 px-6">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-center gap-12">
            
            <div class="text-white max-w-lg text-center md:text-left">
                <h1 class="text-4xl md:text-5xl font-bold mb-4">Envía a Bolivia hoy</h1>
                <p class="text-lg opacity-80 mb-6">Calcula el monto exacto que recibirá tu familiar. Sin comisiones ocultas y con entrega en minutos.</p>
            </div>

            <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">
                <div class="mb-6">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2 tracking-widest">Monto a enviar (Chile)</label>
                    <div class="flex items-center border-b-2 border-blue-600 py-2">
                        <input type="number" value="100000" id="clp-input" class="w-full text-3xl font-bold outline-none text-gray-800">
                        <span class="text-xl font-bold text-gray-400">CLP</span>
                    </div>
                </div>

                <div class="bg-blue-50 rounded-2xl p-4 mb-6">
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-blue-600 font-medium">Tasa de hoy:</span>
                        <span class="font-bold text-blue-800" id="tasa-texto">1 CLP = 0.0078 BOB</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-blue-600 font-medium">Comisión:</span>
                        <span class="font-bold text-green-600">GRATIS</span>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2 tracking-widest">Reciben en Bolivia</label>
                    <div class="flex items-center border-b-2 border-gray-200 py-2">
                        <input type="text" id="bob-output" readonly value="780.00" class="w-full text-3xl font-bold outline-none text-blue-900 bg-transparent">
                        <span class="text-xl font-bold text-gray-400">BOB</span>
                    </div>
                </div>

                <a href="https://wa.me/TUNUMEROAQUI?text=Hola,%20quiero%20hacer%20un%20envío" class="block w-full bg-blue-600 hover:bg-orange-500 text-white text-center font-bold py-5 rounded-2xl transition-all shadow-lg text-xl uppercase tracking-wider">
                    Solicitar Envío
                </a>
            </div>
        </div>
    </section>

    <script>
        // ---------------------------------------------------------
        // MODIFICA AQUÍ LA TASA DE CAMBIO
        // ---------------------------------------------------------
        const TASA_ENVIO = 0.010346; 
        // ---------------------------------------------------------

        const clpInput = document.getElementById('clp-input');
        const bobOutput = document.getElementById('bob-output');
        const tasaTexto = document.getElementById('tasa-texto');

        // Actualizar el texto de la tasa visualmente
        tasaTexto.innerText = `1 CLP = ${TASA_ENVIO} BOB`;

        clpInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const resultado = val * TASA_ENVIO;
            bobOutput.value = resultado.toLocaleString('es-BO', { minimumFractionDigits: 2 });
        });
    </script>

</body>
</html>
