<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador | Full Cell 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-8">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-xl font-extrabold tracking-tighter text-slate-900">
                FULL CELL <span class="text-orange-500">360</span>
            </div>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span> Sistema Activo
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pb-20">
        <div class="w-full max-w-lg">
            
            <div class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-slate-900 mb-2 tracking-tight">Envía a Bolivia</h1>
                <p class="text-slate-500">Cotización segura basada en la tasa del día.</p>
            </div>

            <div class="bg-white rounded-[2rem] p-10 card-shadow border border-slate-100">
                
                <div class="mb-10">
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Desde Chile</span>
                        <span class="text-xs font-bold text-slate-900">CLP 🇨🇱</span>
                    </div>
                    <input type="number" id="input-clp" value="100000" 
                           class="w-full text-5xl font-extrabold text-slate-900 outline-none placeholder-slate-200">
                </div>

                <div class="flex items-center gap-4 mb-10">
                    <div class="h-[1px] flex-grow bg-slate-100"></div>
                    <div id="tasa-badge" class="px-4 py-2 bg-slate-50 border border-slate-100 rounded-full text-[11px] font-bold text-slate-500 italic">
                        Cargando tasa...
                    </div>
                    <div class="h-[1px] flex-grow bg-slate-100"></div>
                </div>

                <div class="mb-10">
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Reciben en Bolivia</span>
                        <span class="text-xs font-bold text-slate-900">BOB 🇧🇴</span>
                    </div>
                    <input type="text" id="output-bob" readonly 
                           class="w-full text-5xl font-extrabold text-blue-600 bg-transparent outline-none">
                </div>

                <button onclick="enviarWhatsApp()" 
                        class="w-full bg-slate-900 hover:bg-orange-500 text-white font-bold py-5 rounded-2xl transition-all duration-300 shadow-lg flex items-center justify-center gap-3 group text-lg">
                    <span>Solicitar transferencia</span>
                    <i class="fas fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
                </button>

            </div>

            <div class="mt-12 flex justify-center gap-8 opacity-20 grayscale">
                <span class="text-xs font-black italic">BANCO UNIÓN</span>
                <span class="text-xs font-black italic">BCP</span>
                <span class="text-xs font-black italic">BANCO GANADERO</span>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN ÚNICA
        const SPREADSHEET_ID = '1w7hj_vFnYEMqdIuHT4Ua2HOhGqjVkPq1K_0qK7q5fLM'; // Reemplaza con el ID de tu Google Sheet
        const TELEFONO = '56945665141';      // Reemplaza con tu WhatsApp

        let tasaGlobal = 0;

        async function fetchTasa() {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&range=B1`;
            try {
                const res = await fetch(url);
                const data = await res.text();
                tasaGlobal = parseFloat(data.replace(/"/g, '').replace(',', '.'));
                
                document.getElementById('tasa-badge').innerText = `1 CLP = ${tasaGlobal} BOB`;
                updateCalculo();
            } catch (e) {
                document.getElementById('tasa-badge').innerText = `Error de conexión`;
            }
        }

        function updateCalculo() {
            const clp = parseFloat(document.getElementById('input-clp').value) || 0;
            const bob = (clp * tasaGlobal).toLocaleString('es-BO', { minimumFractionDigits: 2 });
            document.getElementById('output-bob').value = bob;
        }

        function enviarWhatsApp() {
            const clp = document.getElementById('input-clp').value;
            const bob = document.getElementById('output-bob').value;
            const msg = `*FULL CELL 360 - COTIZACIÓN*%0A%0A` +
                        `🇨🇱 Envía: ${clp} CLP%0A` +
                        `🇧🇴 Recibe: ${bob} BOB%0A` +
                        `📈 Tasa: ${tasaGlobal}%0A%0A` +
                        `_Solicito datos para depósito._`;
            window.open(`https://wa.me/${TELEFONO}?text=${msg}`, '_blank');
        }

        document.getElementById('input-clp').addEventListener('input', updateCalculo);
        fetchTasa();
    </script>
</body>
</html>
