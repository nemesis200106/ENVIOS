<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envíos Calderón | Chile a Bolivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .flag-icon { font-size: 1.5rem; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-6 md:p-10 bg-white md:bg-transparent">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-2xl font-black tracking-tighter text-slate-900 uppercase">
                    ENVÍOS <span class="text-orange-500">CALDERÓN</span>
                </span>
                <span class="text-[10px] font-bold text-slate-400 tracking-[0.3em] uppercase">Tecnología en Remesas</span>
            </div>
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Tasa Online</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 py-10">
        <div class="w-full max-w-lg">
            
            <div class="flex flex-wrap justify-center gap-6 mb-8 opacity-50 grayscale hover:grayscale-0 transition-all">
                <div class="flex flex-col items-center"><i class="fas fa-university text-lg"></i><span class="text-[9px] font-bold mt-1">UNIÓN</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-university text-lg"></i><span class="text-[9px] font-bold mt-1">GANADERO</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-university text-lg"></i><span class="text-[9px] font-bold mt-1">BCP</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-wallet text-lg"></i><span class="text-[9px] font-bold mt-1">TIGO MONEY</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-wallet text-lg"></i><span class="text-[9px] font-bold mt-1">YOLO</span></div>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 md:p-12 card-shadow border border-white relative">
                
                <div class="mb-10">
                    <div class="flex justify-between items-center mb-4">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest italic">Envías desde Chile</label>
                        <div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-lg border border-slate-100">
                            <span class="flag-icon">🇨🇱</span>
                            <span class="text-sm font-bold text-slate-700">CLP</span>
                        </div>
                    </div>
                    <input type="number" id="input-clp" value="100000" 
                           class="w-full text-5xl font-extrabold text-slate-900 outline-none focus:text-orange-600 transition-colors">
                </div>

                <div class="flex items-center gap-4 mb-10">
                    <div class="h-[1px] flex-grow bg-slate-100"></div>
                    <div id="tasa-badge" class="px-6 py-2 bg-slate-900 rounded-full text-[12px] font-bold text-white shadow-xl flex items-center gap-2">
                        <i class="fas fa-sync-alt animate-spin text-[10px]"></i> Sincronizando...
                    </div>
                    <div class="h-[1px] flex-grow bg-slate-100"></div>
                </div>

                <div class="mb-12">
                    <div class="flex justify-between items-center mb-4">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest italic">Reciben en Bolivia</label>
                        <div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-lg border border-slate-100">
                            <span class="flag-icon">🇧🇴</span>
                            <span class="text-sm font-bold text-slate-700">BOB</span>
                        </div>
                    </div>
                    <input type="text" id="output-bob" readonly 
                           class="w-full text-5xl font-extrabold text-blue-600 bg-transparent outline-none">
                </div>

                <button onclick="enviarWhatsApp()" 
                        class="w-full bg-slate-900 hover:bg-orange-500 text-white font-bold py-6 rounded-2xl transition-all duration-300 shadow-xl flex items-center justify-center gap-4 group">
                    <span class="text-lg uppercase tracking-tight">Solicitar Cotización</span>
                    <i class="fab fa-whatsapp text-2xl"></i>
                </button>
            </div>

            <p class="text-center mt-8 text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">
                Santa Cruz · La Paz · Cochabamba · Beni · Pando
            </p>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN FINAL
        const SPREADSHEET_ID = '1w7hj_vFnYEMqdIuHT4Ua2HOhGqjVkPq1K_0qK7q5fLM';
        const TELEFONO = '56945665141';

        let tasaGlobal = 0;

        async function fetchTasa() {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&range=B1`;
            try {
                const res = await fetch(url);
                const data = await res.text();
                tasaGlobal = parseFloat(data.replace(/"/g, '').replace(',', '.'));
                
                document.getElementById('tasa-badge').innerHTML = `1 CLP = ${tasaGlobal} BOB`;
                updateCalculo();
            } catch (e) {
                document.getElementById('tasa-badge').innerText = `Error de Red`;
            }
        }

        function updateCalculo() {
            const clp = parseFloat(document.getElementById('input-clp').value) || 0;
            const bob = (clp * tasaGlobal).toLocaleString('es-BO', { minimumFractionDigits: 2 });
            document.getElementById('output-bob').value = bob;
        }

        function enviarWhatsApp() {
            const clp = document.getElementById('input-clp').value;
            const bob = document.getElementById('output-bob').value;
            const msg = `*ENVÍOS CALDERÓN*%0A%0A` +
                        `🇨🇱 Envío: ${clp} CLP%0A` +
                        `🇧🇴 Recibo: ${bob} BOB%0A` +
                        `📈 Tasa: ${tasaGlobal}%0A%0A` +
                        `_Solicito información para el depósito._`;
            window.open(`https://wa.me/${TELEFONO}?text=${msg}`, '_blank');
        }

        document.getElementById('input-clp').addEventListener('input', updateCalculo);
        fetchTasa();
    </script>
</body>
</html>
